name: Deploy Crash Automator to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Deploy to Cloud Run (Secure Mode)
      run: |
        gcloud run deploy crash-automator-service \
          --source . \
          --region us-central1 \
          --no-allow-unauthenticated \
          --set-env-vars="OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }},JIRA_BOT_EMAIL=automation-bot@yourcompany.com,JIRA_SERVER_URL=https://yourcompany.atlassian.net"
